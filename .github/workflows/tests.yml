name: tests.yml

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gestao_risco_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gestao_risco_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: django-insecure-ci-key
      DEBUG: False
      DATABASE_NAME: gestao_risco_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432

    steps:
      - name: Clona o repositório
        uses: actions/checkout@v5

      - name: Configura o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instala dependências do projeto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Aplica migrations
        run: python manage.py migrate

      - name: Executa testes automatizados
        run: python -m pytest
