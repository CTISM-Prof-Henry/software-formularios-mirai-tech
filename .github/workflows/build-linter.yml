name: build-linter.yml

on:
  push:
    branches:
      - main
      - feat/**
      - tests/**
      - refactor/**
  pull_request:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Clona o repositório
        uses: actions/checkout@v5

      - name: Configura o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instala dependências do backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Executa linter do backend (Ruff)
        run: python -m ruff check .

      - name: Executa linter do backend (Pylint)
        env:
          DJANGO_SETTINGS_MODULE: src.gestao_risco.settings
        run: python -m pylint src/gestao_risco src/usuarios src/riscos

      - name: Configura o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instala dependências do frontend
        working-directory: src/frontend
        run: npm install --prefer-offline

      - name: Executa linter do frontend
        working-directory: src/frontend
        run: npm run lint

      - name: Executa testes do frontend
        working-directory: src/frontend
        run: npm run test:run

      - name: Executa build do frontend
        working-directory: src/frontend
        run: npm run build
